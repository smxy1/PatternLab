<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatternLab - Dashboard</title>
  
  <!-- Google Fonts: Open Sans web-safe (statt System-Fallback).
       visual-design.md: Gewählte Schriftart mit Gewichten 300, 400, 600. -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Single CSS file: Konsistente Farben & Layout über alle 4 Seiten -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ============================================================
       ZWEI-SPALTEN-LAYOUT: Sidebar (250px fixed) + Main (flex: 1)
       Layout-Technologie: CSS Flexbox (siehe style.css .container)
       ============================================================ -->
  <div class="container">
    
    <!-- SIDEBAR: Navigation, Logo, Impressum-Footer
         CSS-Klasse .sidebar steuert: 250px breit, weiß, fester Platz, sticky footer
         Gilt für: index, new-project, project, imprint (konsistent!) -->
    <aside class="sidebar">
      <header><h1>PatternLab</h1></header>
      <nav>
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="new-project.html">Neues Projekt</a></li>
        </ul>
      </nav>
      <footer><a href="imprint.html">Impressum</a></footer>
    </aside>

    <!-- DASHBOARD: CTA-Button + Projektkarten-Grid
         requirements.md: Dashboard zeigt Übersicht mit Projekten
         visual-design.md: "großer Balken / Call-to-Action oben, dann Kartenlayout" -->
    <main class="main-content">
      <section id="dashboard">
        <h2>Meine Projekte</h2>
        
        <!-- CTA-SEKTION: Grüner Button zu new-project.html
             id="new-project" wird von JavaScript abgegriffen (main.js)
             Farbe (Salbeigrün) = Primary Action aus visual-design.md -->
        <section class="cta-section">
          <button id="new-project">+ Neues Projekt erstellen</button>
        </section>

        <!-- PROJEKTE-GRID: 2 Spalten, responsiv mit CSS Grid
             Zeigt Titel | Kategorie | Fortschritt | "Öffnen"-Button
             MOMENTAN: Statische Platzhalter (später aus localStorage dynamisch)
             ZIEL: Nächster JS-Schritt = Karten aus localStorage generieren -->
        <section class="projects">
          <article class="project-card">
            <h3>Platzhalter Projekt 1</h3>
            <p><strong>Kategorie:</strong> Häkeln</p>
            <p><strong>Fortschritt:</strong> 5 / 10</p>
            <button class="open-project-btn">Öffnen</button>
          </article>

          <article class="project-card">
            <h3>Platzhalter Projekt 2</h3>
            <p><strong>Kategorie:</strong> Stricken</p>
            <p><strong>Fortschritt:</strong> 8 / 15</p>
            <button class="open-project-btn">Öffnen</button>
          </article>
        </section>
      </section>
    </main>
  </div>

  <!-- JavaScript: wird später im Semester erklärt -->
  <script src="js/main.js"></script>
</body>
</html>
</body>
</html>
