<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- Viewport-Meta: Stellt sicher, dass die Seite auf mobilen Geräten korrekt skaliert wird. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neues Projekt - PatternLab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Container: Umhüllt Sidebar und Main-Content für flexibles Zwei-Spalten-Layout. Wird mit CSS zu Flexbox gemacht. -->
  <div class="container">
    
    <!-- ============================================================
         SIDEBAR: Vertikale Navigation und App-Header
         ============================================================
         Die Sidebar bleibt beim Scrollen sichtbar und hat eine feste Breite.
         Layout wird durch CSS-Flexbox auf dem Container gesteuert.
         ============================================================ -->
    <aside class="sidebar">
      <!-- Header mit App-Titel: Sichtbar und semantisch als Seiten-Kopfzeile. -->
      <header>
        <h1>PatternLab</h1>
      </header>
      
      <!-- Navigation: <nav> kennzeichnet Navigationslinks semantisch. -->
      <nav>
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="new-project.html">Neues Projekt</a></li>
        </ul>
      </nav>
      
      <!-- Footer in der Sidebar: Impressum ist gesetzlich erforderlich. -->
      <footer>
        <a href="imprint.html">Impressum</a>
      </footer>
    </aside>

    <!-- ============================================================
         HAUPTBEREICH: Projekt-Erstellungsformular
         ============================================================
         Der Hauptbereich nimmt nach der Sidebar den verbleibenden Platz ein.
         Layout wird durch CSS-Flexbox auf dem Container gesteuert.
         ============================================================ -->
    <main class="main-content">
      <!-- Sektion für Projekt-Erstellung: Gruppiert alle Formularinhalte. -->
      <section class="form-container">
        <h2>Neues Projekt</h2>
        
        <!-- Formular: Semantisches Element für Benutzereingaben. Wird später mit JavaScript verarbeitet. -->
        <form id="project-form" class="project-form">
          
          <!-- ============================================================
               FELDGRUPPE 1: Pflichtfelder (Titel, Kategorie)
               ============================================================ -->
          <!-- <fieldset>: Gruppiert zusammenhängende Felder semantisch. <legend>: Beschreibung der Gruppe (wichtig für Screenreader und visuellen Fokus). -->
          <fieldset>
            <legend>Projektinformationen</legend>
            
            <!-- Input-Wrapper: Jedes Feld in einem DIV für konsistente Abstände. -->
            <div class="form-group">
              <!-- <label>: Verknüpfung mit Input via for/id (wichtig für Usability: Klick auf Label fokussiert Input). -->
              <label for="project-title">Projekttitel *</label>
              <!-- type="text": Einzeiliges Textfeld. placeholder: Hilfreicher Hinweis. -->
              <input type="text" id="project-title" name="title" placeholder="Haube" required>
            </div>

            <!-- Kategorieauswahl: <select> mit vordefinierten Optionen. -->
            <div class="form-group">
              <label for="project-category">Kategorie *</label>
              <!-- <select> + <option>: Semantisch korrektes Auswahlfeld für Limited Choices. -->
              <select id="project-category" name="category" required>
                <option value="">-- Wählen Sie eine Kategorie --</option>
                <option value="haekeln">Häkeln</option>
                <option value="stricken">Stricken</option>
                <option value="andere">Andere</option>
              </select>
            </div>
          </fieldset>

          <!-- ============================================================
               FELDGRUPPE 2: Optionale Metadaten
               ============================================================ -->
          <fieldset>
            <legend>Optionale Metadaten</legend>
            
            <!-- Textarea für Beschreibung: Mehrzeiliges Textfeld. -->
            <div class="form-group">
              <label for="project-description">Beschreibung</label>
              <!-- <textarea>: Mehrzeiliges Feld. placeholder: Beispieltext. -->
              <textarea id="project-description" name="description" placeholder="Beschreiben Sie Ihr Projekt..."></textarea>
            </div>

            <!-- Material-Input: Freitextfeld für Materialangaben. -->
            <div class="form-group">
              <label for="project-material">Material</label>
              <input type="text" id="project-material" name="material" placeholder="Schurwolle, Garn">
            </div>

            <!-- Nadelstärke-Input: Freitextfeld für Nadelstärke/Häkelnadel-Größe. -->
            <div class="form-group">
              <label for="project-needle-size">Nadelstärke</label>
              <input type="text" id="project-needle-size" name="needleSize" placeholder="z. B. 3.5 mm">
            </div>
          </fieldset>

          <!-- ============================================================
               FELDGRUPPE 3: PDF-Upload
               ============================================================ -->
          <fieldset>
            <legend>Anleitung</legend>
            
            <!-- File-Input für PDF-Upload. -->
            <div class="form-group">
              <label for="project-pdf">PDF-Datei hochladen *</label>
              <!-- type="file": Öffnet Dateiauswahl. accept="application/pdf": Nur PDF-Dateien erlaubt. -->
              <input type="file" id="project-pdf" name="pdf" accept="application/pdf" required>
            </div>
          </fieldset>

          <!-- Submit-Button: Wird später mit JavaScript verarbeitet (LocalStorage speichern). -->
          <button type="submit" class="btn-primary">Projekt speichern</button>
        </form>
      </section>
    </main>
  </div>

  <!-- JavaScript: wird später im Semester erklärt -->
  <script src="js/main.js"></script>
</body>
</html>
